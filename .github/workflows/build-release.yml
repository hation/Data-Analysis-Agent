name: Build desktop release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version without v prefix, for example 1.0.0"
        required: false
        default: "1.2.0"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            python -m pip install -r requirements.lock.txt
          else
            python -m pip install -r requirements.txt
          fi
          python -m pip install -r requirements-build.txt
      - name: Compile runtime sources
        shell: bash
        run: python -m compileall -q agent api data app.py

  build-windows:
    name: Build Windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Build frontend bundle
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version || '' }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid package version: $version"
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch to avoid CUDA wheels (~2 GB).
          # The +cpu index is only needed on Windows; on macOS torch is CPU-only by default.
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          if (Test-Path -LiteralPath requirements.lock.txt) {
            python -m pip install -r requirements.lock.txt
          } else {
            python -m pip install -r requirements.txt
          }
          python -m pip install -r requirements-build.txt
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build audited Windows installer
        shell: pwsh
        run: pwsh -File packaging/build_windows.ps1 -Version $env:PACKAGE_VERSION
      - name: Upload Windows package and reports
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-package
          if-no-files-found: error
          retention-days: 14
          path: |
            build/windows-package/installer/BusinessAnalyticsAgent-Windows-x64.exe
            build/windows-package/reports/*.json

  build-macos:
    name: Build macOS DMG
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Build frontend bundle
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Resolve package version
        shell: bash
        run: |
          version="${{ github.event.inputs.version || '' }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $version" >&2
            exit 2
          fi
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # macOS torch wheels are CPU-only by default; no special index needed.
          if [ -f requirements.lock.txt ]; then
            python -m pip install -r requirements.lock.txt
          else
            python -m pip install -r requirements.txt
          fi
          python -m pip install -r requirements-build.txt
      - name: Build audited macOS DMG
        shell: bash
        run: bash packaging/build_macos.sh --version "$PACKAGE_VERSION"
      - name: Upload macOS package and reports
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          if-no-files-found: error
          retention-days: 14
          path: |
            build/macos-package/dmg/BusinessAnalyticsAgent-macOS-*.dmg
            build/macos-package/reports/*.json

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Resolve release tag
        shell: bash
        run: |
          # dispatch 输入 "1.0.0" → 拼 "v1.0.0";tag push 直接用 ref_name
          version="${{ github.event.inputs.version || '' }}"
          if [ -n "$version" ]; then
            tag="v${version#v}"
            draft_flag="--draft"
          else
            tag="${GITHUB_REF_NAME}"
            draft_flag=""
          fi
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "Cannot resolve release tag (tag='$tag')" >&2
            exit 2
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "DRAFT_FLAG=$draft_flag" >> "$GITHUB_ENV"
      - name: Verify release artifact boundary
        shell: bash
        run: |
          find release-artifacts -type f | sort
          forbidden="$(find release-artifacts -type f \( \
            -path '*/staging/*' -o \
            -path '*/pyinstaller-dist/*' -o \
            -path '*/pyinstaller-work/*' -o \
            -path '*/dmg-root/*' -o \
            -path '*/MCP/*' -o \
            -path '*/uploads/*' -o \
            -path '*/outputs/*' -o \
            -name '*.log' -o \
            -name '*.p12' -o \
            -name '*.pfx' -o \
            -name '*.mobileprovision' \
          \) -print)"
          if [ -n "$forbidden" ]; then
            echo "$forbidden" >&2
            exit 2
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          rm -rf release-upload
          mkdir -p release-upload
          while IFS= read -r file; do
            base="$(basename "$file")"
            case "$base" in
              *.exe|*.dmg)
                dest="release-upload/$base"
                ;;
              *)
                continue
                ;;
            esac
            if [ -e "$dest" ]; then
              echo "Duplicate release asset name after normalization: $(basename "$dest")" >&2
              echo "Source: $file" >&2
              exit 2
            fi
            cp "$file" "$dest"
          done < <(find release-artifacts -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)

          mapfile -t files < <(find release-upload -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 2
          fi
          notes="Unsigned Business Analytics Agent desktop test packages. Do not treat these artifacts as signed or notarized releases."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "$notes"
            while IFS= read -r asset; do
              case "$asset" in
                *.exe|*.dmg) ;;
                *) gh release delete-asset "$RELEASE_TAG" "$asset" -y ;;
              esac
            done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" $DRAFT_FLAG \
              --title "$RELEASE_TAG" \
              --target ${{ github.sha }} \
              --notes "$notes"
          fi
